
services:
  postgres:
    image: postgres:16-alpine
    container_name: clinica_aba_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aba_user
      POSTGRES_PASSWORD: aba_password
      POSTGRES_DB: clinica_aba
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aba_user -d clinica_aba"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: clinica_aba_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: clinica_aba_pgdata
